name: monitoreo_app
description: Flutter monitoring application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_dotenv: ^5.1.0
  http: ^1.2.0
  image_picker: ^1.1.2
  geolocator: ^11.0.0
  path_provider: ^2.1.3  
  screenshot: ^3.0.0
  share_plus: ^10.1.4
  cupertino_icons: 1.0.8
  provider: 6.1.2
  shared_preferences: 2.5.3
  sqflite: ^2.3.0
  path: ^1.9.0
  collection: ^1.17.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: 6.0.0

# ESTA ES LA SECCIÓN QUE IMPORTA
flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/gp-blanco-centrado.png